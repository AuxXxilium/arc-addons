name: Build eudev Addon

on:
  workflow_dispatch:
    inputs:
      push:
        description: "push"
        default: false
        type: boolean
      eudev:
        description: "update eudev"
        default: true
        type: boolean

jobs:
  eudev:
    strategy:
      matrix:
        include:
          - version: 7.2
            platform: apollolake
            kver: "4.4.302"
          - version: 7.2
            platform: epyc7002
            kver: "5.10.55"
          - version: 7.3
            platform: apollolake
            kver: "4.4.302"
          - version: 7.3
            platform: epyc7002
            kver: "5.10.55"
          - version: 7.4
            platform: apollolake
            kver: "4.4.302"
          - version: 7.4
            platform: epyc7002
            kver: "5.10.55"

    if: inputs.eudev == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Init Env
        run: |
          git config --global user.email "info@auxxxilium.tech"
          git config --global user.name "AuxXxilium"
          sudo timedatectl set-timezone "Europe/Berlin"

      - name: Build eudev
        run: |
          ROOT_PATH=${{ github.workspace }}
          OUTPUT_PATH="${ROOT_PATH}/output-${{ matrix.version }}-${{ matrix.kver }}"
          mkdir -p "${OUTPUT_PATH}"
          # Container runs as uid 1000 (syno-compiler's Dockerfile) and writes
          # directly into the bind-mounted /output.
          chmod 777 "${OUTPUT_PATH}"

          docker run --rm \
            -e EXPECTED_KVER="${{ matrix.kver }}" \
            -v "${ROOT_PATH}/eudev/src:/input" \
            -v "${OUTPUT_PATH}:/output" \
            auxxxilium/syno-compiler:${{ matrix.version }} \
            compile-binary ${{ matrix.platform }} build.sh

          sudo chmod a+rw -R "${OUTPUT_PATH}"
          sudo chmod a+x -R "${OUTPUT_PATH}/bin" "${OUTPUT_PATH}/sbin" "${OUTPUT_PATH}/lib/udev/script"

      - name: Tar to Artifacts
        run: |
          mkdir -p ${{ github.workspace }}/source
          tar caf ${{ github.workspace }}/source/eudev-${{ matrix.version }}-${{ matrix.kver }}.tgz -C ${{ github.workspace }}/output-${{ matrix.version }}-${{ matrix.kver }} .

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: addons
          path: |
            ${{ github.workspace }}/source/*.tgz

  release:
    runs-on: ubuntu-latest
    needs: eudev
    if: inputs.push == true
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Init Env
        run: |
          git config --global user.email "info@auxxxilium.tech"
          git config --global user.name "AuxXxilium"
          sudo timedatectl set-timezone "Europe/Berlin"

      - name: download to artifacts
        uses: actions/download-artifact@v4
        with:
          name: addons
          path: ./artifacts

      - name: Check and Push
        run: |
          if [ `ls artifacts/*.tgz 2> /dev/null | wc -l` -gt 0 ]; then
            echo "Copy eudev ..."
            rm -rf eudev/all/addons/*
            mv -f artifacts/*.tgz eudev/all/addons/

            echo "Git push ..."
            git pull
            status=$(git status -s | grep -E 'eudev/all/addons/' | awk '{printf " %s", $2}')
            if [ -n "${status}" ]; then
              git add ${status}
              git commit -m "eudev: update $(date +%Y-%m-%d" "%H:%M:%S)"
              git push -f
            fi
          else
            echo "No change ..."
          fi